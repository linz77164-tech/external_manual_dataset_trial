title: Official Nuxt UI Templates
description: 'Explore ready-made templates powered by our Vue components. These templates are fully responsive, accessible, and easy to customize, so you can launch your project quickly and effortlessly.'
hero:
  title: Ship [faster]{.text-primary} with :br Nuxt UI Templates
  description: 'Explore ready-made templates powered by our Vue components. These templates are fully responsive, accessible, and easy to customize, so you can launch your project quickly and effortlessly.'
navigation: false
templates:
  - title: 'Portfolio'
    description: "A sleek, modern portfolio template to showcase your work, skills, blog posts, speaking engagements, and provide contact information. Which can customized easily from the `content/` directory."
    icon: i-lucide-user
    framework: nuxt
    features:
      - title: Sections for Projects, Blog, Speaking & About
        icon: i-lucide-layout-list
      - title: Easily editable content via Markdown & YAML
        icon: i-simple-icons-markdown
      - title: Fully responsive design
        icon: i-lucide-smartphone
    links:
      - label: Preview
        to: https://portfolio-template.nuxt.dev
        target: _blank
        leadingIcon: i-logos-nuxt-icon
        trailingIcon: i-lucide-arrow-up-right
        color: neutral
      - label: GitHub
        to: https://github.com/nuxt-ui-templates/portfolio
        target: _blank
        icon: i-simple-icons-github
        color: neutral
        variant: outline
  - title: 'Chat'
    description: "An AI chatbot template designed to help you build your own chatbot with Nuxt UI components."
    icon: i-lucide-message-circle
    framework: nuxt
    features:
      - title: Powered by Vercel AI SDK
        icon: i-simple-icons-vercel
      - title: GitHub OAuth authentication
        icon: i-lucide-lock
      - title: Saved chats and messages
        icon: i-lucide-database
    links:
      - label: Preview
        to: https://chat-template.nuxt.dev
        target: _blank
        leadingIcon: i-logos-nuxt-icon
        trailingIcon: i-lucide-arrow-up-right
        color: neutral
      - label: GitHub
        to: https://github.com/nuxt-ui-templates/chat
        target: _blank
        icon: i-simple-icons-github
        color: neutral
        variant: outline
  - title: 'Dashboard'
    description: "A template to illustrate how to build your own dashboard with 15+ Nuxt UI components, designed specifically to create a consistent look and feel."
    icon: i-lucide-bar-chart-big
    framework: nuxt
    features:
      - title: Mix with SaaS template for a complete solution
        icon: i-lucide-puzzle
      - title: Includes custom components for charts, date pickers, etc.
        icon: i-lucide-bar-chart-big
      - title: Resizable multi-column layout
        icon: i-lucide-columns-3
    links:
      - label: Preview
        to: https://dashboard-template.nuxt.dev
        target: _blank
        leadingIcon: i-logos-nuxt-icon
        trailingIcon: i-lucide-arrow-up-right
        color: neutral
      - label: GitHub
        to: https://github.com/nuxt-ui-templates/dashboard
        target: _blank
        icon: i-simple-icons-github
        color: neutral
        variant: outline
  - title: 'Dashboard'
    description: "A template to illustrate how to build your own dashboard with 15+ Nuxt UI components, designed specifically to create a consistent look and feel."
    icon: i-lucide-bar-chart-big
    framework: vue
    features:
      - title: Includes custom components for charts, date pickers, etc.
        icon: i-lucide-bar-chart-big
      - title: Resizable multi-column layout
        icon: i-lucide-columns-3
    links:
      - label: Preview
        to: https://vue-dashboard-template.nuxt.dev
        target: _blank
        leadingIcon: i-logos-vue
        trailingIcon: i-lucide-arrow-up-right
        color: neutral
      - label: GitHub
        to: https://github.com/nuxt-ui-templates/dashboard-vue
        target: _blank
        icon: i-simple-icons-github
        color: neutral
        variant: outline
  - title: 'SaaS'
    description: "A fully built SaaS application to launch your next project. It includes a landing page, a pricing page, a documentation and a blog which can customized easily from the `content/` directory."
    icon: i-lucide-cloud
    framework: nuxt
    features:
      - title: Includes Landing & Docs sections
        icon: i-lucide-grid-2x2-plus
      - title: Customizable command palette
        icon: i-lucide-command
      - title: Authentication pages (login, register)
        icon: i-lucide-user-round-check
    links:
      - label: Preview
        to: https://saas-template.nuxt.dev
        target: _blank
        leadingIcon: i-logos-nuxt-icon
        trailingIcon: i-lucide-arrow-up-right
        color: neutral
      - label: GitHub
        to: https://github.com/nuxt-ui-templates/saas
        target: _blank
        variant: outline
        icon: i-simple-icons-github
        color: neutral
  - title: 'Landing'
    description: "A landing page template you can use as a starting point for your next idea. You can change the content easily in [`content/index.yml`](https://github.com/nuxt-ui-templates/landing/blob/v3/content/index.yml)."
    icon: i-lucide-layout
    framework: nuxt
    features:
      - title: Full responsive
        icon: i-lucide-smartphone
      - title: Features, Pricing, Testimonials and FAQ sections
        icon: i-lucide-rows-3
      - title: Write content in YAML
        icon: i-simple-icons-yaml
    links:
      - label: Preview
        to: https://landing-template.nuxt.dev
        target: _blank
        leadingIcon: i-logos-nuxt-icon
        trailingIcon: i-lucide-arrow-up-right
        color: neutral
      - label: GitHub
        to: https://github.com/nuxt-ui-templates/landing
        target: _blank
        icon: i-simple-icons-github
        color: neutral
        variant: outline
  - title: 'Docs'
    description: "A ready-to-use documentation template integrated with [Nuxt Content](https://content.nuxt.com). You can start writing your docs right away inside the [`content/`](https://github.com/nuxt-ui-templates/docs/tree/v3/content) directory."
    icon: i-lucide-book
    framework: nuxt
    features:
      - title: Write pages in Markdown
        icon: i-simple-icons-markdown
      - title: Generated navigation & table of contents
        icon: i-lucide-text
      - title: Full-text search out of the box
        icon: i-lucide-search
    links:
      - label: Preview
        to: https://docs-template.nuxt.dev
        target: _blank
        leadingIcon: i-logos-nuxt-icon
        trailingIcon: i-lucide-arrow-up-right
        color: neutral
      - label: GitHub
        to: https://github.com/nuxt-ui-templates/docs/tree/v3
        target: _blank
        variant: outline
        icon: i-simple-icons-github
        color: neutral
  - title: 'Starter'
    description: "A minimal template to get started with Nuxt UI in your Nuxt project."
    icon: i-lucide-flower
    framework: nuxt
    features:
      - title: ESLint Configured
        icon: i-simple-icons-eslint
    links:
      - label: Preview
        to: https://ui-pro-starter.nuxt.dev
        target: _blank
        leadingIcon: i-logos-nuxt-icon
        trailingIcon: i-lucide-arrow-up-right
        color: neutral
